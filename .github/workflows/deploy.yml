name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Официальный путь: свежий Vercel CLI + прямой deploy.
      # Старый amondnet/vercel-action@v25 прибит к vercel@25.1.0, который
      # Vercel API уже отвергает («requires version 47.2.2 or later»).
      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel Production
        run: vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}" --scope=delever
